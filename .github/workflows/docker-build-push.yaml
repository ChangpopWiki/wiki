name: 도커 컨테이너 이미지 빌드 및 푸시

on:
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to GHCR?'
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths:
      - 'build-context/**'
      - 'compose.yaml'
      - 'compose.dev.yaml'
      - 'docker-bake.hcl'

env:
  PUSH_TO_REGISTRY: ${{ github.event_name == 'push' || inputs.push_to_registry }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - if: env.PUSH_TO_REGISTRY == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@v7
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          files: |
            ./compose.yaml
            ./compose.dev.yaml
            ./docker-bake.hcl
          push: ${{ env.PUSH_TO_REGISTRY == 'true' }}