x-volumes:
  # Caddyfileмҡ© л””л үнҶ лҰ¬ л§ҲмҡҙнҠё
  - &caddyfile ./config/caddy:/etc/caddy
  # лҜёл””м–ҙмң„нӮӨ мқҙлҜём§Җ л””л үнҶ лҰ¬ ліјлҘЁ
  - &mediawiki_images ./data/images:/var/www/html/images
  # LocalSettings.php л°Ҹ кё°нғҖ м„Өм • нҢҢмқјмқ„ мң„н•ң ліјлҘЁ
  - &mediawiki_config ./config/mediawiki:/config
  # лі„лҸ„мқҳ нҷ•мһҘ лЎңлҚ” нҢҢмқј
  - &extensions-loader extensions_loader:/var/www/html/extensions-loader
  # лҜёл””м–ҙмң„нӮӨ мҪ”м–ҙм—җ лІҲл“Өлҗҳм§Җ м•ҠмқҖ нҷ•мһҘкіј мҠӨнӮЁмқ„ мң„н•ң ліјлҘЁ
  - &non_bundled_extensions non_bundled_extensions:/non-bundled
  # лЎңкі  нҢҢмқј л§ҲмҡҙнҠё
  - &logo ./resources/logo.svg:/var/www/html/resources/assets/logo.svg

x-setup-base: &x-setup-base
  image: ghcr.io/changpopwiki/wiki-setup:latest
  volumes:
    - *non_bundled_extensions
    - *extensions-loader
    - *mediawiki_config

services:
  mediawiki:
    image: ghcr.io/changpopwiki/wiki-mediawiki:latest
    restart: always
    depends_on:
      database:
        condition: service_started
      setup:
        condition: service_completed_successfully
    env_file:
      - path: .env
    volumes:
      - *caddyfile
      - *mediawiki_images
      - *mediawiki_config
      - *non_bundled_extensions
      - *extensions-loader
      - *logo
    networks:
      chp_proxy:
      default:

  setup:
    <<: *x-setup-base
    command:
      sh -c "install-extensions --generate-loader && install-extensions --check || install-extensions"

  setup-force:
    <<: *x-setup-base
    restart: no
    profiles: [force-setup]
    command:
      sh -c "install-extensions --generate-loader && install-extensions"

  database:
    image: mariadb:lts-ubi
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      CARGOUSER_PASSWORD: ${CARGOUSER_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./build-context/database/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

  backup:
    image: ghcr.io/changpopwiki/wiki-backup:latest
    restart: always
    depends_on:
      database:
        condition: service_started
      mediawiki:
        condition: service_started
    environment:
      # DB м—°кІ° м •ліҙ
      - MARIADB_HOST=database
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}

      # л§Өмқј 06мӢңм—җ л°ұм—… мӢӨн–ү
      - CRON_TIME=0 6 * * *

      # мқјк°„ л°ұм—… ліҙмЎҙ к°ңмҲҳ
      - MAX_DAILY_BACKUPS=${MAX_DAILY_BACKUPS}

      # rclone нҷҳкІҪ ліҖмҲҳ
      - RCLONE_CONFIG_B2_TYPE=b2
      - RCLONE_CONFIG_B2_ACCOUNT=${B2_KEY_ID}
      - RCLONE_CONFIG_B2_KEY=${B2_KEY}
      - RCLONE_REMOTE=B2:${B2_BUCKET_NAME}${B2_BUCKET_PATH}

      # нҺҳмқҙм§Җ л°ұм—…мҡ© нҷҳкІҪліҖмҲҳ
      - GITHUB_APP_ID=${BACKUP_PAGES_GITHUB_APP_ID}
      - GITHUB_INSTALLATION_ID=${BACKUP_PAGES_GITHUB_INSTALLATION_ID}
      - GITHUB_REPO=${BACKUP_PAGES_GITHUB_REPO}
      - GITHUB_SECRET_KEY_PATH=/run/secrets/backup-pages-github-app-pem
    volumes:
      - ./data/db_dump:/backup
    secrets:
      - backup-pages-github-app-pem

volumes:
  db_data:
  non_bundled_extensions:
  extensions_loader:

networks:
  chp_proxy:
    external: true

secrets:
  backup-pages-github-app-pem:
    file: ./secrets/backup-pages-github-app.pem
